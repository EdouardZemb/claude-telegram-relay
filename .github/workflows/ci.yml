name: CI

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup test environment
        run: mkdir -p ~/.claude-relay

      - name: Type check
        run: bunx tsc --noEmit

      - name: Syntax check setup scripts
        run: |
          for f in setup/*.ts; do
            echo "Checking $f..."
            bun build --no-bundle --target=bun "$f" || exit 1
          done

      - name: Run unit tests
        run: bun test tests/unit

      - name: Run integration tests
        run: bun test tests/integration

      - name: Run system tests
        run: bun test tests/system

      - name: Doc freshness check
        run: bun run scripts/doc-freshness.ts

      - name: Verify test count and coverage
        run: |
          # R15: single step — run all tests + extract count and coverage
          # Coverage from unit+integration (system tests excluded from coverage run)
          RESULT=$(bun test tests/unit tests/integration tests/system 2>&1)
          echo "$RESULT" | tail -5

          # Extract test counts (tail -1 to grab only the summary line, not intermediate output)
          PASS_COUNT=$(echo "$RESULT" | grep -oP '\d+ pass' | tail -1 | grep -oP '\d+')
          FAIL_COUNT=$(echo "$RESULT" | grep -oP '\d+ fail' | tail -1 | grep -oP '\d+' || echo "0")
          echo "Tests passed: $PASS_COUNT, failed: $FAIL_COUNT"

          if [ "$FAIL_COUNT" != "0" ]; then
            echo "ERROR: $FAIL_COUNT tests failed"
            exit 1
          fi

          # R17: anti-regression threshold (actual baseline: 2085 as of 2026-03-25)
          if [ "$PASS_COUNT" -lt 2050 ]; then
            echo "WARNING: Expected at least 2050 tests, got $PASS_COUNT"
            exit 1
          fi
          echo "Test count OK: $PASS_COUNT >= 2050"

          # R15/R16: coverage check (unit+integration only for coverage metrics)
          COVERAGE_OUTPUT=$(bun test --coverage --coverage-reporter=text tests/unit tests/integration 2>&1)
          echo "$COVERAGE_OUTPUT" | tail -5

          # R16: case-insensitive grep, graceful degradation if format changes
          LINES=$(echo "$COVERAGE_OUTPUT" | grep -i "all files" | awk -F'|' '{ gsub(/[ %]/, "", $2); print $2 }') || LINES=""
          LINES=$(echo "$LINES" | tr -d '%')
          echo "Line coverage: ${LINES}%"

          if [ -z "$LINES" ]; then
            echo "WARNING: Could not parse coverage output — skipping threshold check (R16: graceful degradation)"
          else
            if (( $(echo "$LINES < 60" | bc -l) )); then
              echo "ERROR: Coverage ${LINES}% below threshold 60%"
              exit 1
            fi
            echo "Coverage OK: ${LINES}% >= 60%"
          fi

      - name: Per-file coverage check
        run: bash scripts/check-coverage.sh

  e2e:
    needs: [check]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup E2E environment
        run: mkdir -p /tmp/claude-relay-e2e-${{ github.run_id }}

      - name: Run E2E tests
        run: bun test tests/e2e
        env:
          RELAY_DIR: /tmp/claude-relay-e2e-${{ github.run_id }}
          TELEGRAM_USER_ID: "123456789"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Cleanup E2E temp dir
        if: always()
        run: rm -rf /tmp/claude-relay-e2e-${{ github.run_id }}
