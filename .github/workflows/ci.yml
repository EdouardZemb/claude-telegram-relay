name: CI

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup test environment
        run: mkdir -p ~/.claude-relay

      - name: Type check
        run: |
          for f in src/*.ts dashboard/server.ts; do
            echo "Checking $f..."
            bun build --no-bundle --target=bun "$f" || exit 1
          done

      - name: Syntax check setup scripts
        run: |
          for f in setup/*.ts; do
            echo "Checking $f..."
            bun build --no-bundle --target=bun "$f" || exit 1
          done

      - name: Run unit tests
        run: bun test tests/unit

      - name: Run integration tests
        run: bun test tests/integration

      - name: Run system tests
        run: bun test tests/system

      - name: Doc freshness check
        run: bun run scripts/doc-freshness.ts

      - name: Verify test count (anti-regression)
        run: |
          RESULT=$(bun test 2>&1)
          echo "$RESULT" | tail -3
          PASS_COUNT=$(echo "$RESULT" | grep -oP '\d+ pass' | grep -oP '\d+')
          FAIL_COUNT=$(echo "$RESULT" | grep -oP '\d+ fail' | grep -oP '\d+' || echo "0")
          echo "Tests passed: $PASS_COUNT, failed: $FAIL_COUNT"
          if [ "$FAIL_COUNT" != "0" ]; then
            echo "ERROR: $FAIL_COUNT tests failed"
            exit 1
          fi
          if [ "$PASS_COUNT" -lt 600 ]; then
            echo "WARNING: Expected at least 600 tests, got $PASS_COUNT"
            exit 1
          fi

  e2e:
    needs: [check]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup E2E environment
        run: mkdir -p /tmp/claude-relay-e2e-${{ github.run_id }}

      - name: Run E2E tests
        run: bun test tests/e2e
        env:
          RELAY_DIR: /tmp/claude-relay-e2e-${{ github.run_id }}
          TELEGRAM_USER_ID: "123456789"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Cleanup E2E temp dir
        if: always()
        run: rm -rf /tmp/claude-relay-e2e-${{ github.run_id }}
